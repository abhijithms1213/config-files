# Window Rules Configuration
# See https://wiki.hyprland.org/Configuring/Window-Rules/

# General window behavior
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Application-specific opacity settings
# windowrulev2 = opacity 0.89 0.89, class:^(kitty)$
windowrulev2 = opacity 0.8 0.8, class:^(firefox)$
windowrulev2 = opacity 0.9 0.9, class:^(thunar)$
windowrulev2 = opacity 0.8 0.8, class:^(chromium)$
# windowrulev2 = blur, class:^(rofi)$

# windowrulev2 = opacity 0.8, class:^(rofi-power)$
# windowrulev2 = float, class:^(rofi)$
# windowrulev2 = center, class:^(rofi)$
# windowrulev2 = noborder, class:^(rofi)$
# windowrulev2 = noanim, class:^(rofi)$
# VSCode opacity (commented out - uncomment if needed)
# windowrulev2 = opacity 0.8 0.85,class:^(Code)$

# Example floating window rule (commented out)
# windowrule = float,class:^(kitty)$,title:^(kitty)$
