# Autostart Configuration
# Programs to launch at startup

# Cursor theme settings
exec-once = gsettings set org.gnome.desktop.interface cursor-theme BreezeX-RosePine-Linux
exec-once = gsettings set org.gnome.desktop.interface cursor-size 28

# System services
# exec-once = waybar 
exec-once = waybar & swaync 

# Start the swww daemon
exec-once = swww-daemon

# Set wallpaper for specific monitor (HDMI-A-1)
exec-once = swww img $HOME/.cache/current_wallpaper_hdmi -o HDMI-A-1

# You might have another for your primary monitor, e.g. DP-1
exec-once = swww img $HOME/.cache/current_wallpaper_dp -o eDP-1

# exec-once = hyprpaper
exec-once = hypridle >> ~/hypridle.log
exec-once = wl-paste --watch cliphist store
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Application autostart
exec-once = [workspace 1 silent] /home/cj/.local/bin/obsidian.AppImage
# exec-once = [workspace 2 silent] /home/cj/Documents/projects/scripts/autostart-tmuxifier.sh
exec-once = /home/cj/Documents/projects/scripts/reminder.sh

# Scripts
exec-once = scripts/check-battery.sh
# Note: Consider moving hardcoded paths to variables or using relative paths
