general {
  gaps_in = 4
  gaps_out = 3
  border_size = 3

col.active_border = rgba(160,20,20,1) rgba(40,0,0,0.9) 45deg
col.inactive_border = rgba(15,0,0,0.85)

  resize_on_border = false
  allow_tearing = false
  layout = master
}

decoration {
  rounding = 1
  rounding_power = 2

  active_opacity = 0.98
  inactive_opacity = 0.94

  shadow {
    enabled = true
    range = 8
    render_power = 4
    color = rgba(120,0,0,220)
  }

  blur {
    enabled = false
  }
}
