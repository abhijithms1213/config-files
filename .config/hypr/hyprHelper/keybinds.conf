# Keybindings Configuration
# See https://wiki.hyprland.org/Configuring/Binds/
# Declare

# Basic window management
bind = $mainMod, n, exec,kitty -o include="~/.config/kitty/kitty-themes/themes/Neutron.conf" 
bind = $mainMod, c, killactive
bind = $mainMod SHIFT,Q, exit
bind = $mainMod, E, exec, thunar
bind = $mainMod, Q, exec, localsend
bind = $mainMod, g, togglefloating

# Resize the active window to 1280x720
bind = $mainMod, g,resizeactive,exact 800 600
# bind = $mainMod, R, exec, ~/.config/rofi/launchers/type-2/launcher.sh 3 9 , 4 4 ,
bind = $mainMod, R, exec, ~/.config/rofi/launchers/type-2/launcher.sh 7 4
# bind = $mainMod, R, exec, [float; center; size 1000 600] rofi -show drun
bind = $mainMod, b, pseudo # dwindle
bind = $mainMod, t, togglesplit # dwindle
bind = $mainMod, m, fullscreen, 1

# ==========================================
# special workspace commands

bind = ALT, Q, movetoworkspacesilent, special:minimized
bind = ALT SHIFT, Q, togglespecialworkspace, minimized
bind = ALT SHIFT, Q, submap, minimized
submap = minimized
bind = , F4, killactive
bind =  ALT,Space, movetoworkspace, +0
bind =  ALT,Space, submap, reset
bind = , mouse:272, movetoworkspace, +0
bind = , mouse:272, submap, reset
bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev
bind = $mainMod, escape, togglespecialworkspace, minimized
bind = $mainMod, escape, submap, reset
submap = reset
# ==========================================

# Focus movement (vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspace navigation (custom setup)
bind = $mainMod, u, exec, hyprctl dispatch workspace 2 && hyprctl dispatch workspace 1
bind = $mainMod, i, exec, hyprctl dispatch workspace 4 && hyprctl dispatch workspace 3
bind = $mainMod, y, exec, hyprctl dispatch workspace 10
bind = $mainMod, o, workspace, 6
bind = $mainMod, o, workspace, 5
bind = $mainMod, p, workspace, 8
bind = $mainMod, p, workspace, 7

# Workspace switching
bind = $mainMod, TAB, workspace, -1
bind = $mainMod SHIFT, TAB, workspace, +1

# Move windows between workspaces
bind = $mainMod SHIFT, left, movetoworkspace, +1
bind = $mainMod SHIFT, right, movetoworkspace, -1
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, 0, togglespecialworkspace, magic
bind = $mainMod SHIFT, 0, movetoworkspace, special:magic

# Mouse workspace navigation
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse window controls
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Resize windows
binde = $mainMod SHIFT, y, resizeactive,-50 0
binde = $mainMod SHIFT, o, resizeactive,50 0
binde = $mainMod SHIFT, i, resizeactive,0 -50
binde = $mainMod SHIFT, u, resizeactive,0 50
# Volume controls
bindel = ,XF86AudioRiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bind = $mainMod, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness controls
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = ALT, up, exec, ddcutil setvcp 10 + 10
bindel = ALT, down, exec, ddcutil setvcp 10 - 10

# Media player controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Clipboard manager
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshot controls
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = , PRINT, exec, hyprshot -m output
bind = $shiftMod, PRINT, exec, hyprshot -m region

# Alternative volume controls (duplicates - consider cleaning up)
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#===============================

# ✅ custom bindings
#===============================
# Custom application launchers
#===============================
# super bindigs
bind = SUPER, D, exec, ~/.config/rofi/themesMine/launcher_apps.sh
bind = SUPER, 2, exec, ~/.config/rofi/powermenu/type-1/powermenu.sh 4 6
bind = SUPER, 3, exec,  ~/.config/hypr/scripts/keybinds_for_hypr.sh

# MAIN MODE AS super  
bind = $mainMod, 8, exec, code --new-window --title "Special Code"


# MAIN MODE SHIFT AS super  
bind = SUPER SHIFT, l, exec, hyprlock
bind = SUPER SHIFT, o, cyclenext,
bind = SUPER SHIFT, W, exec,  ~/.config/hypr/scripts/wifi_menu.sh
# ALT bindigs
bind = alt, space, exec, $(hyprctl activewindow -j | jq '.floating') && \
    hyprctl dispatch cyclenext tiled || hyprctl dispatch cyclenext floating

# ALT SHIFT bindigs
bind = ALT SHIFT, k, exec, ~/.config/hypr/scripts/kill_proc.sh
bind = ALT SHIFT, m, exec, ~/.config/hypr/scripts/wofi_monitor_specific.sh
bindr = ALT SHIFT, 9, exec, ~/.config/hypr/scripts/kill_waybar.sh
bind = ALT SHIFT, n, exec, ~/.config/rofi/themesMine/rofi_scripts/noteTaking.sh
bind = ALT SHIFT, s, exec, ~/.config/rofi/themesMine/rofi_scripts/kill_before_off.sh

bind = ALT SHIFT, 4, exec, ~/.config/hypr/scripts/wallpaper_full.sh "eDP-1"
bind = ALT SHIFT, 5, exec, ~/.config/hypr/scripts/wallpaper_full.sh "HDMI-A-1"
#===============================
bind = $mainMod , a,exec , hyprctl keyword general:layout scrolling
bind = $mainMod SHIFT, a,exec , hyprctl keyword general:layout master
