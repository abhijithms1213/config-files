# Input Configuration
# Keyboard, mouse, and touchpad settings

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    follow_mouse = 1
    float_switch_override_focus = 0
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification
    
    touchpad {
        natural_scroll = false
    }
}
misc{
 focus_on_activate = true  
}

