# Workspace Configuration
# Monitor-specific workspace assignments

# eDP-1 (laptop screen) workspaces
workspace = 6, monitor:eDP-1
workspace = 2, monitor:eDP-1, default:true
workspace = 4, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 10, monitor:eDP-1

# HDMI-A-1 (external monitor) workspaces  
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 7, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# Smart gaps configuration (commented out)
# Uncomment the following lines if you want "smart gaps" (no gaps when only one window)
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]
