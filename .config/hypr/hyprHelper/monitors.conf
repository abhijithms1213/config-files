# Monitor Configuration
# See https://wiki.hyprland.org/Configuring/Monitors/

monitor=,1920x1080,auto,1.5
monitor=HDMI-A-1,1920x1080,auto,1

# Enable fractional scaling support
xwayland {
    force_zero_scaling = true
}

# Uncomment if you need fractional scaling
# misc {
#     enable_fractional_scaling = true
# }
